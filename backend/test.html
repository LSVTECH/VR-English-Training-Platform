<!DOCTYPE html>
<html>
<head>
    <title>Prueba por Texto</title>
    <style>
        body { font-family: Arial; padding: 20px; background-color: #1e1e1e; color: #fff; }
        #chat { border: 1px solid #444; height: 350px; overflow-y: auto; padding: 15px; margin-bottom: 10px; background: #2d2d2d; border-radius: 8px;}
        .msg { margin: 10px 0; padding: 10px; border-radius: 8px; max-width: 80%; }
        .user { background-color: #005f9e; margin-left: auto; color: white;}
        .ai { background-color: #388e3c; margin-right: auto; color: white;}
        .error { background-color: #d32f2f; margin-right: auto; color: white; }
        .container { max-width: 600px; margin: 0 auto; }
        input[type="text"] { width: 75%; padding: 10px; border-radius: 4px; border: 1px solid #555; background: #333; color: white;}
        button { padding: 10px 20px; background-color: #0078d7; color: white; border: none; border-radius: 4px; cursor: pointer; }
        button:hover { background-color: #005f9e; }
        audio { width: 100%; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="container">
        <h2>Laboratorio de Prueba (Solo Texto)</h2>
        <div id="chat"></div>
        <div>
            <input type="text" id="textInput" placeholder="Escribe tu mensaje en inglés...">
            <button onclick="sendText()">Enviar</button>
        </div>
        <audio id="audioPlayer" controls></audio>
    </div>

    <script>
        const sessionId = "test-" + Math.floor(Math.random() * 10000);
        const chat = document.getElementById('chat');

        // Iniciar sesion
        fetch('/api/v1/session/init', { method: 'POST' })
            .then(r => r.json())
            .then(data => {
                chat.innerHTML += `<div class="msg ai"><strong>Michael Brown:</strong> ${data.ai_greeting}</div>`;
            });

        function sendText() {
            const text = document.getElementById('textInput').value;
            if (!text) return;
            
            chat.innerHTML += `<div class="msg user"><strong>Tú:</strong> ${text}</div>`;
            document.getElementById('textInput').value = '';
            chat.scrollTop = chat.scrollHeight;

            const formData = new FormData();
            formData.append('text', text);
            formData.append('session_id', sessionId);
            formData.append('turn_number', 1);

            fetch('/api/v1/conversation_text', {
                method: 'POST',
                body: formData
            })
            .then(r => r.json())
            .then(data => {
                if (data.error) {
                    chat.innerHTML += `<div class="msg error"><strong>ERROR:</strong> ${data.error}</div>`;
                } else {
                    chat.innerHTML += `<div class="msg ai"><strong>Michael Brown:</strong> ${data.ai_response_text}</div>`;
                    
                    const audio = document.getElementById('audioPlayer');
                    audio.src = data.audio_url + "?t=" + new Date().getTime();
                    audio.play().catch(e => console.log("Auto-play prevenido", e));
                }
                chat.scrollTop = chat.scrollHeight;
            })
            .catch(err => {
                chat.innerHTML += `<div class="msg error"><strong>ERROR RED:</strong> ${err}</div>`;
                chat.scrollTop = chat.scrollHeight;
            });
        }
    </script>
</body>
</html>
